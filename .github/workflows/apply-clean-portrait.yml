name: Apply clean portrait hero

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-clean-portrait.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Integrate portrait as a background layer
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          index = Path('index.html')
          html = index.read_text(encoding='utf-8')

          hero = '''<section class="hero">
          <div class="hero-grid">
            <div class="hero-copy">
              <div class="badge"><i class="fa-solid fa-circle"></i> <span data-i18n="badge">Computer Science &amp; Artificial Intelligence</span></div>
              <h1 data-i18n="heroTitle">My Portfolio</h1>
              <div class="hero-translation" id="heroTranslation">Welcome To My View</div>
              <p class="lead" data-i18n-html="heroLead">أنا أنس — طالب <b style="color:var(--gold)">Computer Science with Artificial Intelligence</b>. أحب أبني أشياء تجمع بين الذكاء الاصطناعي، الكود، التصوير، والتسويق بطريقة لها شخصية.</p>
              <a class="btn" href="#projects"><i class="fa-solid fa-rocket"></i> <span data-i18n="heroBtn">شوف مشاريعي</span></a>
            </div>
            <div class="hero-art" aria-hidden="true">
              <div class="portrait-background"></div>
            </div>
          </div>
          </section>'''

          html, replaced = re.subn(r'<section class="hero">.*?</section>', hero, html, count=1, flags=re.S)
          if replaced != 1:
              raise SystemExit(f'Expected one hero section, replaced {replaced}')

          stylesheet = '<link href="./assets/portrait-hero.css" rel="stylesheet">'
          if stylesheet not in html:
              html = html.replace('</head>', stylesheet + '</head>', 1)

          index.write_text(html, encoding='utf-8')
          PY

          cat > assets/portrait-hero.css <<'CSS'
          /* Portrait hero: the artwork is a CSS background, not an <img>, so browser image-search overlays cannot appear. */
          .hero{
            min-height:92vh;
            display:grid;
            align-items:center;
            padding-top:3.5rem;
            padding-bottom:3.5rem;
            overflow:hidden;
          }

          .hero-grid{
            width:min(1280px,100%);
            margin-inline:auto;
            display:grid;
            grid-template-columns:minmax(0,1.08fr) minmax(390px,.92fr);
            align-items:center;
            gap:clamp(1.5rem,4vw,4rem);
            direction:ltr;
          }

          .hero-copy{
            position:relative;
            z-index:2;
            max-width:720px;
            text-align:left;
            direction:ltr;
          }

          html[dir="rtl"] .hero-copy{
            text-align:right;
            direction:rtl;
          }

          .hero h1{
            font-size:clamp(4rem,7vw,6.5rem);
            line-height:.98;
            white-space:nowrap;
            margin:1rem 0 .45rem;
          }

          .hero .hero-translation{
            justify-content:flex-start;
          }

          html[dir="rtl"] .hero .hero-translation{
            justify-content:flex-end;
          }

          .hero .lead{
            max-width:700px;
          }

          .hero-art{
            position:relative;
            min-height:clamp(560px,64vh,730px);
            display:grid;
            align-items:end;
            justify-items:center;
            pointer-events:none;
            user-select:none;
            isolation:isolate;
          }

          .hero-art::before{
            content:'';
            position:absolute;
            inset:10% 2% 2%;
            z-index:-1;
            background:radial-gradient(circle at 52% 43%,rgba(201,169,110,.19),rgba(201,169,110,.055) 37%,transparent 68%);
            filter:blur(24px);
          }

          .portrait-background{
            width:min(100%,620px);
            height:clamp(560px,68vh,760px);
            background-image:url('./anas-digital-portrait.webp');
            background-repeat:no-repeat;
            background-size:contain;
            background-position:center bottom;
            filter:drop-shadow(0 22px 45px rgba(0,0,0,.62));
            pointer-events:none;
            user-select:none;
            animation:portraitReveal 1.15s .35s both cubic-bezier(.2,.7,.2,1);
          }

          @keyframes portraitReveal{
            from{opacity:0;transform:translateY(26px) scale(.975);filter:blur(7px) drop-shadow(0 22px 45px rgba(0,0,0,.62))}
            to{opacity:1;transform:none;filter:drop-shadow(0 22px 45px rgba(0,0,0,.62))}
          }

          @media(max-width:1100px){
            .hero-grid{grid-template-columns:minmax(0,1fr) minmax(330px,.82fr);gap:1.5rem}
            .hero h1{font-size:clamp(3.8rem,7vw,5.4rem)}
            .portrait-background{height:clamp(500px,60vh,660px)}
          }

          @media(max-width:900px){
            .hero{padding-top:4rem}
            .hero-grid{grid-template-columns:1fr;gap:.5rem}
            .hero-copy,html[dir="rtl"] .hero-copy{text-align:center;direction:inherit;margin-inline:auto}
            .hero .hero-translation,html[dir="rtl"] .hero .hero-translation{justify-content:center}
            .hero h1{white-space:normal;font-size:clamp(3.4rem,14vw,5.6rem)}
            .hero-art{min-height:430px;margin-top:.5rem}
            .portrait-background{width:min(100%,520px);height:min(118vw,590px)}
          }

          @media(max-width:520px){
            .hero{padding-inline:1.25rem}
            .hero-art{min-height:360px}
            .portrait-background{height:min(126vw,500px)}
          }

          @media(prefers-reduced-motion:reduce){
            .portrait-background{animation:none}
          }
          CSS

      - name: Commit the finished hero
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/apply-clean-portrait.yml
          git add index.html assets/portrait-hero.css .github/workflows/apply-clean-portrait.yml
          git commit -m "Integrate clear portrait cleanly into hero"
          git push
