name: Bust portrait cache

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/bust-portrait-cache.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Force fresh portrait assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python - <<'PY'
          from pathlib import Path
          index=Path('index.html')
          html=index.read_text(encoding='utf-8')
          html=html.replace('./assets/portrait-hero.css"','./assets/portrait-hero.css?v=20260715-3"')
          index.write_text(html,encoding='utf-8')
          css_path=Path('assets/portrait-hero.css')
          css=css_path.read_text(encoding='utf-8')
          css=css.replace("./anas-digital-portrait.webp')","./anas-digital-portrait.webp?v=20260715-3')")
          css_path.write_text(css,encoding='utf-8')
          PY
          rm -f .github/workflows/bust-portrait-cache.yml
          git add index.html assets/portrait-hero.css .github/workflows/bust-portrait-cache.yml
          git commit -m "Force fresh portrait assets"
          git push
