name: Apply visible portrait image

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Replace portrait background with a real image
        run: |
          python - <<'PY'
          from pathlib import Path

          index = Path('index.html')
          html = index.read_text(encoding='utf-8')

          old = '<div class="portrait-background"></div>'
          new = '''<img
                class="portrait-image"
                src="./assets/anas-digital-portrait.webp?v=20260715-5"
                alt=""
                aria-hidden="true"
                draggable="false"
                data-disable-visual-search="true"
                data-no-visual-search="true"
                oncontextmenu="return false"
              >'''

          if old not in html and 'class="portrait-image"' not in html:
              raise SystemExit('Portrait container was not found')
          if old in html:
              html = html.replace(old, new, 1)
          html = html.replace('portrait-hero.css?v=20260715-3','portrait-hero.css?v=20260715-5')
          index.write_text(html, encoding='utf-8')

          css_path = Path('assets/portrait-hero.css')
          css = css_path.read_text(encoding='utf-8')
          marker = '/* FINAL VISIBLE PORTRAIT */'
          if marker not in css:
              css += '''

/* FINAL VISIBLE PORTRAIT */
.portrait-background{display:none!important}
.portrait-image{
  display:block!important;
  position:relative;
  z-index:3;
  width:min(100%,620px);
  height:clamp(560px,68vh,760px);
  object-fit:contain;
  object-position:center bottom;
  opacity:1!important;
  visibility:visible!important;
  filter:drop-shadow(0 22px 45px rgba(0,0,0,.62));
  pointer-events:none!important;
  user-select:none!important;
  -webkit-user-select:none!important;
  -webkit-user-drag:none!important;
  touch-action:none;
  animation:portraitReveal 1.15s .35s both cubic-bezier(.2,.7,.2,1);
}
@media(max-width:1100px){.portrait-image{height:clamp(500px,60vh,660px)}}
@media(max-width:900px){.portrait-image{width:min(100%,520px);height:min(118vw,590px)}}
@media(max-width:520px){.portrait-image{height:min(126vw,500px)}}
@media(prefers-reduced-motion:reduce){.portrait-image{animation:none}}
'''
          css_path.write_text(css, encoding='utf-8')
          PY

      - name: Commit the final portrait fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/use-visible-portrait-img.yml
          rm -f .portrait-trigger
          git add index.html assets/portrait-hero.css .github/workflows/use-visible-portrait-img.yml .portrait-trigger
          git commit -m "Show portrait clearly without visual-search overlay"
          git push
