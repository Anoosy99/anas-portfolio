name: Apply real portrait

on:
  push:
    branches: [main]
    paths:
      - '.portrait-apply-trigger'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore valid portrait and clean the hero
        run: |
          set -e
          cat portrait_parts_small/part0.txt portrait_parts_small/part1.txt portrait_parts_small/part2.txt > /tmp/portrait.b64
          base64 --decode /tmp/portrait.b64 > assets/anas-digital-portrait.webp
          file assets/anas-digital-portrait.webp
          python - <<'PY'
          from pathlib import Path
          import re

          p = Path('index.html')
          html = p.read_text(encoding='utf-8')
          html = re.sub(
              r'src="\./assets/anas-digital-portrait\.webp(?:\?v=[^"]*)?"',
              'src="./assets/anas-digital-portrait.webp?v=20260716-final"',
              html,
              count=1,
          )
          html = html.replace(
              '<img class="portrait-image"',
              '<img class="portrait-image" data-disable-visual-search="true"',
              1,
          ) if 'data-disable-visual-search="true"' not in html else html
          p.write_text(html, encoding='utf-8')
          PY
          rm -rf portrait_parts portrait_parts_small
          rm -f .portrait-apply-trigger
          rm -f .github/workflows/apply-real-portrait.yml

      - name: Commit verified portrait
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix portrait asset and hero display"
          git push
