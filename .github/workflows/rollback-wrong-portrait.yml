name: Roll back wrong portrait

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/rollback-wrong-portrait.yml'

permissions:
  contents: write

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Restore clean portfolio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout 312a276d6de35113de97038db4b68ad688ef1d03 -- index.html
          rm -f assets/anas-digital-portrait.svg
          rm -f .github/workflows/apply-portrait-hero.yml
          rm -f .github/workflows/rollback-wrong-portrait.yml
          git add -A
          git commit -m "Remove incorrect portrait and restore clean hero"
          git push
